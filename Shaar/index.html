<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שער — נחשו את שחקן ליגת העל</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #1a6b3f;
    --pitch-alt: #1f7a48;
    --pitch-line: #135840;
    --pitch-line-light: #1c6b4f;
    --cream: #f2efe6;
    --cream-dim: #cfc9b8;
    --gold: #c9a227;
    --gold-bright: #e0bc4a;
    --match-green: #34c759;
    --miss-bg: #0e4b38;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: repeating-linear-gradient(180deg, var(--pitch) 0 64px, var(--pitch-alt) 64px 128px);
    color: var(--cream);
    font-family: 'Heebo', -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }
  #pitchMarkings { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  #pitchMarkings line, #pitchMarkings circle, #pitchMarkings rect { stroke: var(--cream); stroke-opacity: 0.16; stroke-width: 2; fill: none; }
  .wrap { width: 100%; max-width: 760px; position: relative; z-index: 1; }
  .club-badge { display: inline-block; width: 22px; height: 22px; margin-left: 6px; flex: none; object-fit: contain; vertical-align: middle; }
  .club-fallback { display: inline-block; font-size: 16px; margin-left: 6px; vertical-align: middle; }
  header { text-align: center; margin-bottom: 24px; }
  .badge { display: inline-block; font-size: 12px; color: var(--gold-bright); border: 1px solid var(--gold); border-radius: 999px; padding: 4px 14px; margin-bottom: 14px; }
  h1 { font-weight: 900; font-size: clamp(38px, 9vw, 58px); margin: 0 0 6px; color: var(--cream); text-shadow: 0 3px 0 var(--pitch-line); }
  h1 span { color: var(--gold-bright); }
  .subtitle { color: var(--cream-dim); font-size: 15px; max-width: 480px; margin: 0 auto; line-height: 1.6; }
  .guess-row { display: flex; gap: 10px; margin-bottom: 20px; position: relative; }
  #playerInput { flex: 1; padding: 14px 16px; border-radius: var(--radius); border: 2px solid var(--pitch-line-light); background: #ffffff; color: #0b3d2e; font-size: 16px; font-weight: 700; outline: none; font-family: inherit; }
  #playerInput:focus { border-color: var(--gold); }
  #playerInput:disabled { opacity: 0.6; }
  #guessBtn { padding: 14px 24px; border-radius: var(--radius); border: none; background: var(--gold); color: #1c1400; font-weight: 900; font-size: 15px; cursor: pointer; font-family: inherit; }
  #guessBtn:disabled { background: var(--pitch-line-light); color: var(--cream-dim); cursor: not-allowed; }
  #guessBtn:not(:disabled):hover { background: var(--gold-bright); }
  #autocomplete { position: absolute; top: 56px; right: 0; left: 96px; background: #ffffff; border-radius: var(--radius); overflow-y: auto; max-height: 260px; box-shadow: 0 10px 24px rgba(0,0,0,0.35); z-index: 10; }
  .ac-item { padding: 11px 16px; color: #0b3d2e; font-weight: 700; font-size: 14.5px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ac-meta { display: flex; align-items: center; gap: 6px; color: #6b6552; font-weight: 500; font-size: 12.5px; flex: none; }
  .ac-badge { width: 20px; height: 20px; object-fit: contain; flex: none; }
  .ac-fallback { font-size: 14px; }
  .ac-item:hover, .ac-item.active { background: #f2efe6; }
  #counter { text-align: center; font-size: 13px; color: var(--cream-dim); margin-bottom: 16px; }
  #counter b { color: var(--gold-bright); }
  #feedbackWrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 22px; }
  #feedbackBtn { background: none; border: 1px solid var(--pitch-line-light); color: var(--cream-dim); font-family: inherit; font-size: 12.5px; padding: 6px 14px; border-radius: 999px; cursor: pointer; }
  #feedbackBtn:hover { color: var(--cream); border-color: var(--gold); }
  #feedbackForm { width: 100%; max-width: 420px; margin-top: 10px; background: var(--pitch-line); border-radius: var(--radius); padding: 12px; }
  #feedbackText { width: 100%; resize: vertical; border-radius: 8px; border: none; padding: 10px; font-family: inherit; font-size: 13.5px; color: #0b3d2e; background: #ffffff; }
  #feedbackActions { display: flex; gap: 8px; margin-top: 8px; }
  #feedbackSend, #feedbackCancel { flex: 1; padding: 8px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  #feedbackSend { background: var(--gold); color: #1c1400; }
  #feedbackSend:hover { background: var(--gold-bright); }
  #feedbackCancel { background: var(--pitch-line-light); color: var(--cream); }
  #feedbackThanks { margin-top: 8px; font-size: 12.5px; color: var(--gold-bright); text-align: center; }
  #board { display: flex; flex-direction: column; gap: 10px; }
  .col-labels, .guess-card { display: grid; grid-template-columns: 1.3fr 1.1fr 1fr 1fr 0.7fr 0.6fr; gap: 8px; }
  .col-labels { padding: 0 2px; font-size: 11px; color: var(--cream-dim); }
  .cell { background: var(--miss-bg); border-radius: 8px; padding: 10px 4px; text-align: center; font-size: 13px; font-weight: 700; line-height: 1.25; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 54px; color: var(--cream); transform: rotateX(90deg); animation: flip 0.5s ease forwards; }
  .cell span.arrow { font-size: 10px; margin-top: 2px; opacity: 0.85; }
  .cell.match { background: var(--match-green); color: #0b2f1a; }
  .cell.name.winner { background: var(--match-green); color: #0b2f1a; }
  #targetCard { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
  #targetPhoto { width: 120px; height: 120px; border-radius: 50%; background: var(--pitch-line); border: 3px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #targetPhoto svg { width: 78%; height: 78%; filter: blur(9px); transition: filter 0.7s ease; }
  .silhouette-part { fill: var(--cream-dim); }
  #targetPhoto.revealed .silhouette-part { fill: var(--gold-bright); }
  #targetPhoto.revealed svg { filter: blur(0); }
  #targetCardLabel { margin-top: 10px; font-size: 13px; font-weight: 700; color: var(--cream-dim); }
  #targetCardLabel.revealed { color: var(--gold-bright); font-size: 15px; }
  @keyframes flip { to { transform: rotateX(0deg); } }
  .cell:nth-child(1){animation-delay:0s}.cell:nth-child(2){animation-delay:.08s}.cell:nth-child(3){animation-delay:.16s}.cell:nth-child(4){animation-delay:.24s}.cell:nth-child(5){animation-delay:.32s}.cell:nth-child(6){animation-delay:.4s}
  #endMessage { text-align: center; margin-top: 0; margin-bottom: 22px; padding: 20px; border-radius: var(--radius); background: var(--pitch-line); display: none; }
  #endMessage h2 { margin: 0 0 6px; color: var(--gold-bright); font-weight: 900; }
  #shareBtn { margin-top: 14px; padding: 12px 24px; border-radius: 999px; border: none; background: var(--gold); color: #1c1400; font-weight: 900; font-size: 14px; font-family: inherit; cursor: pointer; }
  #shareBtn:hover { background: var(--gold-bright); }
  #shareConfirm { margin-top: 10px; font-size: 13px; color: var(--gold-bright); }
  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--cream-dim); opacity: 0.75; }
  @media (max-width: 480px) {
    .col-labels, .guess-card { grid-template-columns: 1.1fr 1fr 0.85fr 0.85fr 0.6fr 0.55fr; }
    .cell { font-size: 11px; padding: 8px 3px; min-height: 46px; }
    #autocomplete { left: 0; }
  }
</style>
</head>
<body>
<svg id="pitchMarkings" preserveAspectRatio="none" viewBox="0 0 100 100">
  <line x1="0" y1="50" x2="100" y2="50" /><circle cx="50" cy="50" r="9" /><circle cx="50" cy="50" r="0.6" fill="var(--cream)" stroke="none" />
  <rect x="30" y="-6" width="40" height="20" /><rect x="38" y="-3" width="24" height="10" /><rect x="30" y="86" width="40" height="20" /><rect x="38" y="93" width="24" height="10" />
</svg>
<div class="wrap">
  <header>
    <div class="badge">ליגת העל · עונת 2025/26</div>
    <h1>שע<span>ר</span></h1>
    <p class="subtitle">נחשו את שחקן ליגת העל היומי של ישראל.</p>
  </header>

  <div id="targetCard">
    <div id="targetPhoto">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle class="silhouette-part" cx="50" cy="32" r="18"/><path class="silhouette-part" d="M14 96c0-24 16-38 36-38s36 14 36 38"/>
      </svg>
    </div>
    <div id="targetCardLabel">שחקן מסתורין — נחשו נכון כדי לחשוף</div>
  </div>

  <div id="endMessage">
    <h2 id="endTitle"></h2>
    <p id="endSub"></p>
    <button id="shareBtn" type="button">📤 שיתוף תוצאה</button>
    <div id="shareConfirm" style="display:none;">הועתק ללוח! שתפו עם חברים 🎉</div>
  </div>

  <div class="guess-row">
    <input type="text" id="playerInput" placeholder="הקלידו שם שחקן…" autocomplete="off">
    <button id="guessBtn" disabled>נחש</button>
    <div id="autocomplete" style="display:none;"></div>
  </div>

  <div id="feedbackWrap">
    <button id="feedbackBtn" type="button">🐞 דיווח על באג</button>
    <div id="feedbackForm" style="display:none;">
      <textarea id="feedbackText" placeholder="מה קרה? ספרו לנו בכמה מילים…" rows="3"></textarea>
      <div id="feedbackActions">
        <button id="feedbackSend" type="button">שליחה</button>
        <button id="feedbackCancel" type="button">ביטול</button>
      </div>
      <div id="feedbackThanks" style="display:none;">תודה! נפתחה עבורכם הודעת מייל — שילחו אותה כדי להשלים את הדיווח.</div>
    </div>
  </div>

  <div id="counter">ניסיון <b id="guessNum">1</b> מתוך <b>6</b></div>

  <div class="col-labels">
    <div>שחקן</div><div>קבוצה</div><div>תפקיד</div><div>לאום</div><div>גיל</div><div>מס'</div>
  </div>
  <div id="board"></div>

  <footer>נתוני ליגת העל הרשמיים · 14 מועדונים</footer>
</div>

<script>
const CLUB_META = {
  'בית"ר ירושלים': { logoUrl: 'CLUBS/bj.png' },
  'הפועל באר שבע': { logoUrl: 'CLUBS/hb.png' },
  'הפועל חיפה': { logoUrl: 'CLUBS/hh.png' },
  'הפועל ירושלים': { logoUrl: 'CLUBS/hj.png' },
  'הפועל פתח תקווה': { logoUrl: 'CLUBS/hpt.png' },
  'הפועל חדרה': { logoUrl: 'CLUBS/hrg.png' },
  'הפועל תל אביב': { logoUrl: 'CLUBS/hta.png' },
  'בני סכנין': { logoUrl: 'CLUBS/ibs.png' },
  'עירוני קרית שמונה': { logoUrl: 'CLUBS/iks.png' },
  'עירוני טבריה': { logoUrl: 'CLUBS/it.png' },
  'מכבי חיפה': { logoUrl: 'CLUBS/mh.png' },
  'מכבי נתניה': { logoUrl: 'CLUBS/mn.png' },
  'מכבי פתח תקווה': { logoUrl: 'CLUBS/mpt.png' },
  'מכבי תל אביב': { logoUrl: 'CLUBS/mta.png' },
  'מכבי בני ריינה': { logoUrl: 'CLUBS/mh.png' },
  'מ.ס. אשדוד': { logoUrl: 'CLUBS/it.png' }
};

let PLAYERS = [];
let target = null;
let guesses = [];
let gameOver = false;

const MAX_GUESSES = 6;
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
function seededIndex(dateStr, listLength) { let hash = 0; for (let i = 0; i < dateStr.length; i++) { hash = (hash * 31 + dateStr.charCodeAt(i)) >>> 0; } return hash % listLength; }

// טעינת הנתונים
fetch('players.json')
  .then(res => res.json())
  .then(data => {
    PLAYERS = data;
    target = PLAYERS[seededIndex(todayKey(), PLAYERS.length)];
    guessBtn.disabled = false;
  })
  .catch(err => console.error("Error loading players:", err));

const inputEl = document.getElementById('playerInput');
const guessBtn = document.getElementById('guessBtn');
const acEl = document.getElementById('autocomplete');
const boardEl = document.getElementById('board');
const guessNumEl = document.getElementById('guessNum');
const endMessageEl = document.getElementById('endMessage');
const endTitleEl = document.getElementById('endTitle');
const endSubEl = document.getElementById('endSub');

function makeGuess(player) {
  if (gameOver) return;
  guesses.push(player);
  renderGuessRow(player);
  updateCounter();
  
  const won = player.name === target.name && player.associated_club === target.associated_club;
  if (won || guesses.length >= MAX_GUESSES) {
    gameOver = true; inputEl.disabled = true; guessBtn.disabled = true; acEl.style.display = 'none';
    endTitleEl.textContent = won ? 'כל הכבוד! ⚽' : 'נגמרו הניסיונות';
    endSubEl.textContent = `השחקן היה ${target.name} (${target.associated_club}).`;
    endMessageEl.style.display = 'block';
    if (won) document.getElementById('targetPhoto').classList.add('revealed');
  } else { inputEl.value = ''; guessBtn.disabled = true; }
}

function updateCounter() { guessNumEl.textContent = String(Math.min(guesses.length + 1, MAX_GUESSES)); }

function renderGuessRow(player) {
  const row = document.createElement('div'); row.className = 'guess-card';
  const isWinner = player.name === target.name && player.associated_club === target.associated_club;
  row.appendChild(cell(player.name, 'name' + (isWinner ? ' winner' : '')));
  row.appendChild(clubCell(player.associated_club, player.associated_club === target.associated_club ? 'match' : ''));
  row.appendChild(cell(player.position, player.position === target.position ? 'match' : ''));
  row.appendChild(cell(player.country_of_origin, player.country_of_origin === target.country_of_origin ? 'match' : ''));
  row.appendChild(ageCell(player.age));
  row.appendChild(jerseyCell(player.jersey_number));
  boardEl.prepend(row);
}

function clubCell(clubName, cls) {
  const div = document.createElement('div'); div.className = 'cell ' + cls;
  const meta = CLUB_META[clubName];
  if (meta && meta.logoUrl) {
    const img = document.createElement('img'); img.src = meta.logoUrl; img.className = 'club-badge';
    div.appendChild(img);
  } else {
    const span = document.createElement('span'); span.className = 'club-fallback'; span.textContent = '🛡️ '; div.appendChild(span);
  }
  const t = document.createElement('span'); t.textContent = clubName; div.appendChild(t);
  return div;
}

function ageCell(guessAge) {
  const div = document.createElement('div'); div.className = 'cell ' + (guessAge === target.age ? 'match' : '');
  div.textContent = String(guessAge);
  if (guessAge !== target.age) {
    const arr = document.createElement('span'); arr.className = 'arrow';
    arr.textContent = guessAge < target.age ? '▲ גבוה' : '▼ נמוך'; div.appendChild(arr);
  }
  return div;
}

function jerseyCell(guessNum) {
  const div = document.createElement('div'); div.className = 'cell ' + (guessNum === target.jersey_number ? 'match' : '');
  div.textContent = String(guessNum);
  if (guessNum !== target.jersey_number) {
    const arr = document.createElement('span'); arr.className = 'arrow';
    arr.textContent = guessNum < target.jersey_number ? '▲ גבוה' : '▼ נמוך'; div.appendChild(arr);
  }
  return div;
}

function cell(text, cls) { const div = document.createElement('div'); div.className = 'cell ' + cls; div.textContent = text; return div; }

inputEl.addEventListener('input', () => {
  const q = inputEl.value.trim(); guessBtn.disabled = true; delete inputEl.dataset.selectedIdx;
  if (!q) { acEl.style.display = 'none'; return; }
  const matched = PLAYERS.filter(p => p.name.includes(q)).slice(0, 8);
  if (matched.length === 0) { acEl.style.display = 'none'; return; }
  acEl.innerHTML = '';
  matched.forEach(p => {
    const idx = PLAYERS.indexOf(p);
    const div = document.createElement('div'); div.className = 'ac-item';
    const meta = CLUB_META[p.associated_club];
    const badgeHtml = (meta && meta.logoUrl)
      ? `<img class="ac-badge" src="${meta.logoUrl}" alt="${p.associated_club}">`
      : `<span class="ac-fallback">🛡️</span>`;
    div.innerHTML = `<span>${p.name}</span><span class="ac-meta">${badgeHtml}${p.position}</span>`;
    div.addEventListener('click', () => { inputEl.value = p.name; acEl.style.display = 'none'; guessBtn.disabled = false; inputEl.dataset.selectedIdx = idx; });
    acEl.appendChild(div);
  });
  acEl.style.display = 'block';
});

guessBtn.addEventListener('click', () => {
  const idx = inputEl.dataset.selectedIdx;
  if (idx !== undefined) { const p = PLAYERS[idx]; delete inputEl.dataset.selectedIdx; makeGuess(p); }
});

// No backend here, so "sending" a report opens the user's email
// app with a pre-filled message. Replace FEEDBACK_EMAIL with a
// real inbox before sharing this further.
const FEEDBACK_EMAIL = 'your-email@example.com'; // TODO: replace with your real address

const feedbackBtn = document.getElementById('feedbackBtn');
const feedbackForm = document.getElementById('feedbackForm');
const feedbackText = document.getElementById('feedbackText');
const feedbackActions = document.getElementById('feedbackActions');
const feedbackThanks = document.getElementById('feedbackThanks');

feedbackBtn.addEventListener('click', () => {
  const opening = feedbackForm.style.display === 'none';
  feedbackForm.style.display = opening ? 'block' : 'none';
  feedbackActions.style.display = 'flex';
  feedbackThanks.style.display = 'none';
  feedbackText.value = '';
  if (opening) feedbackText.focus();
});

document.getElementById('feedbackCancel').addEventListener('click', () => {
  feedbackForm.style.display = 'none';
});

document.getElementById('feedbackSend').addEventListener('click', () => {
  const message = feedbackText.value.trim();
  if (!message) { feedbackText.focus(); return; }

  const subject = encodeURIComponent("דיווח על באג — שער");
  const body = encodeURIComponent(
    `${message}\n\n---\nניסיון מס': ${guesses.length}\nשחקן היום (למנפחי אשמה): ${target ? target.name : 'לא נטען'}\nUser agent: ${navigator.userAgent}`
  );
  window.location.href = `mailto:${FEEDBACK_EMAIL}?subject=${subject}&body=${body}`;

  feedbackActions.style.display = 'none';
  feedbackThanks.style.display = 'block';
});

/* ============================================================
   SHARE RESULT
   Builds a spoiler-free emoji grid (no player names, just colored
   squares) so people can post their result without giving away
   the answer — the same trick Wordle made popular. 🟩 = exact
   match, 🔼/🔽 = miss on age/number but points toward the answer.
   ============================================================ */
const LAUNCH_DATE = new Date(2026, 6, 20); // day 1 of the game — adjust if needed

function dayNumber() {
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((todayMidnight - LAUNCH_DATE) / 86400000) + 1;
}

function squareExact(match) { return match ? '🟩' : '⬛'; }
function squareDirectional(guessVal, targetVal) {
  if (guessVal === targetVal) return '🟩';
  return guessVal < targetVal ? '🔼' : '🔽';
}

function buildShareGrid() {
  return guesses.map(g => {
    const club = squareExact(g.associated_club === target.associated_club);
    const pos = squareExact(g.position === target.position);
    const nat = squareExact(g.country_of_origin === target.country_of_origin);
    const age = squareDirectional(g.age, target.age);
    const num = squareDirectional(g.jersey_number, target.jersey_number);
    return club + pos + nat + age + num;
  }).join('\n');
}

function buildShareText() {
  const won = guesses.some(g => g.name === target.name && g.associated_club === target.associated_club);
  const scoreLine = won ? `${guesses.length}/${MAX_GUESSES}` : `X/${MAX_GUESSES}`;
  const url = location.href.split('?')[0].split('#')[0];
  return `שער ⚽ #${dayNumber()} — ${scoreLine}\n\n${buildShareGrid()}\n\nנחשו גם אתם: ${url}`;
}

const shareBtn = document.getElementById('shareBtn');
const shareConfirm = document.getElementById('shareConfirm');

shareBtn.addEventListener('click', async () => {
  const text = buildShareText();

  // On mobile, the native share sheet is nicer than a clipboard copy.
  if (navigator.share) {
    try { await navigator.share({ text }); return; }
    catch (e) { /* user cancelled the share sheet — fall through to clipboard */ }
  }

  try {
    await navigator.clipboard.writeText(text);
    shareConfirm.style.display = 'block';
    setTimeout(() => { shareConfirm.style.display = 'none'; }, 3000);
  } catch (e) {
    window.prompt('העתיקו את התוצאה:', text);
  }
});
</script>
</body>
</html>
